name: Build and push frontend to OCIR

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    outputs:
      image_repo: ${{ steps.vars.outputs.image_repo }}
      image_digest: ${{ steps.build.outputs.digest }}
      commit_short_sha: ${{ steps.vars.outputs.commit_short_sha }}
    env:
      OCI_CLI_USER: ${{ secrets.OCI_CLI_USER }}
      OCI_CLI_TENANCY: ${{ secrets.OCI_CLI_TENANCY }}
      OCI_CLI_FINGERPRINT: ${{ secrets.OCI_CLI_FINGERPRINT }}
      OCI_CLI_KEY_CONTENT: ${{ secrets.OCI_CLI_KEY_CONTENT }}
      OCI_CLI_REGION: ${{ secrets.OCI_REGION }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set short git SHA and tag
        id: vars
        run: |
          shortSha=$(git rev-parse --short "${GITHUB_SHA}")
          imageRepo="${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/resume/frontend"
          echo "COMMIT_SHORT_SHA=$shortSha" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=$shortSha" >> "$GITHUB_ENV"
          echo "IMAGE_REPO=$imageRepo" >> "$GITHUB_ENV"
          echo "commit_short_sha=$shortSha" >> "$GITHUB_OUTPUT"
          echo "image_repo=$imageRepo" >> "$GITHUB_OUTPUT"

      - name: Log in to OCIR (Docker login)
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.OCI_REGION }}.ocir.io
          username: ${{ secrets.OCI_TENANCY_NAMESPACE }}/${{ secrets.OCI_USERNAME }}
          password: ${{ secrets.OCI_AUTH_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push frontend image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ secrets.OCI_REGION }}.ocir.io/${{ secrets.OCI_TENANCY_NAMESPACE }}/resume/frontend:${{ env.COMMIT_SHORT_SHA }}

      - name: Verify immutable image refs
        run: |
          set -euo pipefail
          docker buildx imagetools inspect "${IMAGE_REPO}@${{ steps.build.outputs.digest }}"
          docker buildx imagetools inspect "${IMAGE_REPO}:${COMMIT_SHORT_SHA}"
